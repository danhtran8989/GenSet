# configs/configs.yml

# ====================== Base URLs ======================
base_urls:
  mistral: "https://api.mistral.ai/v1"
  ollama: "https://ollama.com"
  openai: "https://api.openai.com/v1"
  gemini: "https://generativelanguage.googleapis.com/v1beta"

# ====================== Default Models ======================
default_models:
  mistral: "mistral-small-latest"
  ollama: "gemma3:12b-cloud"
  openai: "gpt-4o-mini"
  gemini: "gemini-2.0-flash"

# ====================== Output Settings ======================
output:
  default_dir: "output"
  default_file: "dataset.tsv"

# ====================== Platform Registry ======================
platforms:
  mistral:
    base_url_key: mistral
    default_model_key: mistral
    key_list_key: mistral
  ollama:
    base_url_key: ollama
    default_model_key: ollama
    key_list_key: ollama
  openai:
    base_url_key: openai
    default_model_key: openai
    key_list_key: openai
  gemini:
    base_url_key: gemini
    default_model_key: gemini
    key_list_key: gemini

# ====================== Generation Defaults ======================
generation_defaults:
  temperature: 0.7
  delay: 0.8
  min_sentences: 1
  max_sentences: 5